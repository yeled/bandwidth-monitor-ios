name: BandwidthMonitor
options:
  bundleIdPrefix: com.evilforbeginners
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: SA2SS4242K
    CODE_SIGN_STYLE: Automatic
    # Single source of truth for both targets. Bump MARKETING_VERSION for a user-facing
    # release; bump CURRENT_PROJECT_VERSION for every TestFlight/App Store upload.
    MARKETING_VERSION: "0.9.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  BandwidthMonitor:
    type: application
    platform: iOS
    sources:
      - path: BandwidthMonitor
    info:
      path: BandwidthMonitor/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Only standard HTTPS, no non-exempt crypto — pre-answers App Store Connect's
        # export-compliance question so it isn't asked on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Portrait-only. Lives here (not hand-edited into the generated Info.plist) so it
        # survives `xcodegen generate`.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "Bandwidth Monitor connects to your router on the local network to read traffic stats."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: BandwidthMonitor/BandwidthMonitor.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evilforbeginners.BandwidthMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evilforbeginners.BandwidthMonitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BandwidthMonitorWidgetExtension
        embed: true

  BandwidthMonitorWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BandwidthMonitor/Shared
      - path: BandwidthMonitorWidget
    info:
      path: BandwidthMonitorWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Traffic Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: BandwidthMonitorWidget/BandwidthMonitorWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.evilforbeginners.BandwidthMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evilforbeginners.BandwidthMonitor.TrafficWidget
        TARGETED_DEVICE_FAMILY: "1"
