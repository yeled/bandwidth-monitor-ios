name: BandwidthMonitor
options:
  bundleIdPrefix: com.evilforbeginners
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  BandwidthMonitor:
    type: application
    platform: iOS
    sources:
      - path: BandwidthMonitor
    info:
      path: BandwidthMonitor/Info.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Bandwidth Monitor connects to your router on the local network to read traffic stats."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evilforbeginners.BandwidthMonitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
